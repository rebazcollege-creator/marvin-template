name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  xani:
    name: Xanî — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xani
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: xani/package-lock.json
      - run: npm ci
      - name: Lint (renderer)
        run: npm run lint
      - name: Typecheck (renderer)
        run: npx tsc --noEmit
      - name: Typecheck (sidecar)
        run: npx tsc -p sidecar --noEmit
      - name: Sidecar tests
        run: npm run sidecar:test
