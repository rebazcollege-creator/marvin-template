<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xanî — Liquid Metal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
<style>
  :root {
    --teal: #8df7e6;
    --blue: #5aa9ff;
    --violet: #b088ff;
    --terracotta: #ff7a52;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0d12; }
  body {
    background:
      radial-gradient(circle at 50% 42%, rgba(90,169,255,0.10), rgba(11,13,18,0) 55%),
      radial-gradient(circle at 78% 78%, rgba(176,136,255,0.08), rgba(11,13,18,0) 60%),
      #0b0d12;
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
  }
  #gl {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }
  #overlay {
    position: fixed;
    top: 26px;
    left: 30px;
    pointer-events: none;
    z-index: 10;
    user-select: none;
  }
  #overlay .brand {
    font-family: 'Space Grotesk', serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.82);
    line-height: 1;
  }
  #overlay .desc {
    margin-top: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.42);
  }
  #fallback {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.55);
    z-index: 20;
  }
</style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="overlay">
    <div class="brand">Xanî</div>
    <div class="desc">Liquid Metal — a living mercury mind.</div>
  </div>
  <div id="fallback">WebGL unavailable</div>

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
  import * as THREE from 'three';

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  try {
    const canvas = document.getElementById('gl');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 4.2);

    // ---- Procedural aurora environment (CanvasTexture -> PMREM) ----
    function makeEnvCanvas() {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 512;
      const ctx = c.getContext('2d');
      // vertical aurora gradient
      const g = ctx.createLinearGradient(0, 0, 0, 512);
      g.addColorStop(0.00, '#0b0d12');
      g.addColorStop(0.30, '#1a2740');
      g.addColorStop(0.50, '#5aa9ff');
      g.addColorStop(0.65, '#8df7e6');
      g.addColorStop(0.80, '#b088ff');
      g.addColorStop(1.00, '#ff7a52');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 512, 512);
      // soft glowing blobs for interesting reflections
      const blobs = [
        [140, 150, 160, 'rgba(141,247,230,0.55)'],
        [380, 200, 190, 'rgba(90,169,255,0.55)'],
        [260, 380, 220, 'rgba(176,136,255,0.45)'],
        [420, 430, 150, 'rgba(255,122,82,0.40)']
      ];
      for (const [x, y, r, col] of blobs) {
        const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
        rg.addColorStop(0, col);
        rg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = rg;
        ctx.fillRect(0, 0, 512, 512);
      }
      return c;
    }

    const envTex = new THREE.CanvasTexture(makeEnvCanvas());
    envTex.mapping = THREE.EquirectangularReflectionMapping;
    envTex.colorSpace = THREE.SRGBColorSpace;

    const pmrem = new THREE.PMREMGenerator(renderer);
    pmrem.compileEquirectangularShader();
    const envRT = pmrem.fromEquirectangular(envTex);
    scene.environment = envRT.texture;
    envTex.dispose();
    pmrem.dispose();

    // ---- Chrome / mercury material ----
    const material = new THREE.MeshStandardMaterial({
      color: 0xdfe6f0,
      metalness: 1.0,
      roughness: 0.12,
      envMapIntensity: 1.35
    });

    // Uniforms for shader injection
    const uniforms = {
      uTime: { value: 0 },
      uPointer: { value: new THREE.Vector3(0, 0, 1) }, // direction of cursor influence
      uPointerStrength: { value: 0 },
      uAmp: { value: reduceMotion ? 0.05 : 0.22 }
    };

    // Inject curl/simplex-style noise displacement into the vertex shader.
    material.onBeforeCompile = (shader) => {
      shader.uniforms.uTime = uniforms.uTime;
      shader.uniforms.uPointer = uniforms.uPointer;
      shader.uniforms.uPointerStrength = uniforms.uPointerStrength;
      shader.uniforms.uAmp = uniforms.uAmp;

      shader.vertexShader = shader.vertexShader
        .replace('#include <common>', `
          #include <common>
          uniform float uTime;
          uniform vec3  uPointer;
          uniform float uPointerStrength;
          uniform float uAmp;

          // Ashima 3D simplex noise
          vec4 permute(vec4 x){ return mod(((x*34.0)+1.0)*x, 289.0); }
          vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314 * r; }
          float snoise(vec3 v){
            const vec2 C = vec2(1.0/6.0, 1.0/3.0);
            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
            vec3 i  = floor(v + dot(v, C.yyy));
            vec3 x0 = v - i + dot(i, C.xxx);
            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min(g.xyz, l.zxy);
            vec3 i2 = max(g.xyz, l.zxy);
            vec3 x1 = x0 - i1 + 1.0 * C.xxx;
            vec3 x2 = x0 - i2 + 2.0 * C.xxx;
            vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
            i = mod(i, 289.0);
            vec4 p = permute( permute( permute(
                       i.z + vec4(0.0, i1.z, i2.z, 1.0))
                     + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                     + i.x + vec4(0.0, i1.x, i2.x, 1.0));
            float n_ = 1.0/7.0;
            vec3 ns = n_ * D.wyz - D.xzx;
            vec4 j = p - 49.0 * floor(p * ns.z *ns.z);
            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_);
            vec4 x = x_ *ns.x + ns.yyyy;
            vec4 y = y_ *ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);
            vec4 b0 = vec4(x.xy, y.xy);
            vec4 b1 = vec4(x.zw, y.zw);
            vec4 s0 = floor(b0)*2.0 + 1.0;
            vec4 s1 = floor(b1)*2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));
            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
            vec3 p0 = vec3(a0.xy, h.x);
            vec3 p1 = vec3(a0.zw, h.y);
            vec3 p2 = vec3(a1.xy, h.z);
            vec3 p3 = vec3(a1.zw, h.w);
            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
          }

          float fbm(vec3 p){
            float f = 0.0;
            f += 0.55 * snoise(p);
            f += 0.28 * snoise(p * 2.03 + 11.7);
            f += 0.14 * snoise(p * 4.11 + 27.3);
            return f;
          }
        `)
        .replace('#include <begin_vertex>', `
          #include <begin_vertex>

          vec3 nrm = normalize(normal);
          float t = uTime * 0.35;

          // undulating fbm displacement along the normal
          float base = fbm(position.xyz * 1.15 + vec3(0.0, 0.0, t));
          float ripple = 0.4 * snoise(position.xyz * 3.2 + vec3(t * 1.6));

          // cursor influence: bulge toward/away from pointer direction
          float facing = max(dot(nrm, normalize(uPointer)), 0.0);
          float cursorBulge = pow(facing, 3.0) * uPointerStrength;

          float disp = (base + ripple) * uAmp + cursorBulge * 0.5;
          transformed += nrm * disp;
        `);

      // Recompute normals approximately so lighting follows the deformation.
      shader.vertexShader = shader.vertexShader.replace(
        '#include <beginnormal_vertex>',
        `#include <beginnormal_vertex>`
      );

      material.userData.shader = shader;
    };

    const geometry = new THREE.IcosahedronGeometry(1.15, 7);
    geometry.computeVertexNormals();
    const blob = new THREE.Mesh(geometry, material);
    scene.add(blob);

    // Subtle rim/fill lights to complement the env map
    const key = new THREE.DirectionalLight(0x8df7e6, 1.1);
    key.position.set(3, 3, 4);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xb088ff, 0.7);
    fill.position.set(-4, -1, 2);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xff7a52, 0.5);
    rim.position.set(0, -3, -4);
    scene.add(rim);
    scene.add(new THREE.AmbientLight(0x5aa9ff, 0.25));

    // ---- Pointer interaction ----
    const pointer = { x: 0, y: 0 };            // -1..1
    const target = { x: 0, y: 0, strength: 0 };
    const rot = { x: 0, y: 0 };

    window.addEventListener('pointermove', (e) => {
      target.x = (e.clientX / window.innerWidth) * 2 - 1;
      target.y = -((e.clientY / window.innerHeight) * 2 - 1);
      target.strength = 1;
    });
    window.addEventListener('pointerleave', () => { target.strength = 0; });

    // ---- Resize ----
    function onResize() {
      const w = window.innerWidth, h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    // ---- Animate ----
    const clock = new THREE.Clock();
    const pointerDir = new THREE.Vector3();

    function tick() {
      const t = clock.getElapsedTime();

      // smooth pointer follow
      pointer.x += (target.x - pointer.x) * 0.06;
      pointer.y += (target.y - pointer.y) * 0.06;
      const strength = uniforms.uPointerStrength;
      strength.value += (target.strength - strength.value) * 0.05;

      // cursor influence direction (in local-ish space projected to blob)
      pointerDir.set(pointer.x, pointer.y, 0.8).normalize();
      uniforms.uPointer.value.copy(pointerDir);
      uniforms.uTime.value = reduceMotion ? 0.0 : t;

      // parallax rotation driven by cursor + slow drift
      const drift = reduceMotion ? 0 : t * 0.08;
      rot.y += ((pointer.x * 0.6 + drift) - rot.y) * 0.04;
      rot.x += ((pointer.y * -0.45) - rot.x) * 0.04;
      blob.rotation.y = rot.y;
      blob.rotation.x = rot.x;

      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    tick();

  } catch (err) {
    console.error(err);
    document.getElementById('gl').style.display = 'none';
    document.getElementById('fallback').style.display = 'flex';
  }
  </script>
</body>
</html>
