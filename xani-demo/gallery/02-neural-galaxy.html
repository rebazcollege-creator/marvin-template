<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xanî — Neural Galaxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0d12;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
  body {
    background:
      radial-gradient(ellipse 120% 90% at 50% 40%, #12161f 0%, #0b0d12 55%, #06070a 100%);
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
  }
  #gl {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }
  #overlay {
    position: fixed;
    top: 26px;
    left: 30px;
    pointer-events: none;
    z-index: 10;
    user-select: none;
  }
  #overlay .brand {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.82);
    text-shadow: 0 1px 20px rgba(90,169,255,0.25);
  }
  #overlay .desc {
    margin-top: 5px;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 12.5px;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.42);
  }
  #fallback {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    letter-spacing: 0.05em;
    color: rgba(255,255,255,0.6);
    z-index: 20;
  }
</style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="overlay">
    <div class="brand">Xanî</div>
    <div class="desc">Neural Galaxy — fly through your second brain.</div>
  </div>
  <div id="fallback">WebGL unavailable</div>

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
  import * as THREE from 'three';

  const showFallback = () => {
    document.getElementById('fallback').style.display = 'flex';
    document.getElementById('gl').style.display = 'none';
  };

  try {
    const canvas = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x0b0d12, 1);

    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // --- Aurora palette ---
    const PALETTE = [
      new THREE.Color(0x8df7e6), // teal
      new THREE.Color(0x5aa9ff), // blue
      new THREE.Color(0xb088ff), // violet
      new THREE.Color(0xff7a52), // terracotta
    ];

    const scene = new THREE.Scene();
    const FOG_NEAR = 40;
    const FOG_FAR = 460;
    scene.fog = new THREE.Fog(0x0b0d12, FOG_NEAR, FOG_FAR);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 0, 0);

    // --- Procedural radial-gradient sprite texture ---
    function makeSprite() {
      const s = 128;
      const c = document.createElement('canvas');
      c.width = c.height = s;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
      g.addColorStop(0.0, 'rgba(255,255,255,1)');
      g.addColorStop(0.2, 'rgba(255,255,255,0.85)');
      g.addColorStop(0.45, 'rgba(255,255,255,0.28)');
      g.addColorStop(1.0, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, s, s);
      const tex = new THREE.CanvasTexture(c);
      tex.needsUpdate = true;
      return tex;
    }
    const spriteTex = makeSprite();

    // --- Field geometry ---
    // Nodes live in a bounded box; camera flies +Z through it and we wrap nodes.
    const NODE_COUNT = 1200;
    const HALF_XY = 120;   // half-extent in x/y
    const DEPTH = 900;     // total travel depth before wrap
    const NEAR_Z = 30;     // wrap plane in front of camera

    const positions = new Float32Array(NODE_COUNT * 3);
    const colors = new Float32Array(NODE_COUNT * 3);
    const sizes = new Float32Array(NODE_COUNT);
    const baseColor = new Float32Array(NODE_COUNT * 3);
    const baseSize = new Float32Array(NODE_COUNT);

    for (let i = 0; i < NODE_COUNT; i++) {
      const x = (Math.random() * 2 - 1) * HALF_XY;
      const y = (Math.random() * 2 - 1) * HALF_XY;
      const z = -Math.random() * DEPTH; // ahead of camera (negative Z forward)
      positions[i*3+0] = x;
      positions[i*3+1] = y;
      positions[i*3+2] = z;

      const col = PALETTE[Math.floor(Math.random() * PALETTE.length)].clone();
      // subtle per-node variation
      col.offsetHSL((Math.random()-0.5)*0.05, 0, (Math.random()-0.5)*0.12);
      baseColor[i*3+0] = col.r; baseColor[i*3+1] = col.g; baseColor[i*3+2] = col.b;
      colors[i*3+0] = col.r; colors[i*3+1] = col.g; colors[i*3+2] = col.b;

      const sz = 2.6 + Math.random() * 3.4;
      baseSize[i] = sz;
      sizes[i] = sz;
    }

    const nodeGeo = new THREE.BufferGeometry();
    nodeGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    nodeGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    nodeGeo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

    // Custom ShaderMaterial for per-point size + sprite + additive glow + fog
    const nodeMat = new THREE.ShaderMaterial({
      uniforms: {
        uTex: { value: spriteTex },
        uPixelRatio: { value: renderer.getPixelRatio() },
        fogColor: { value: scene.fog.color },
        fogNear: { value: FOG_NEAR },
        fogFar: { value: FOG_FAR },
      },
      vertexShader: `
        attribute float aSize;
        varying vec3 vColor;
        varying float vFogDepth;
        uniform float uPixelRatio;
        void main() {
          vColor = color;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          vFogDepth = -mv.z;
          gl_PointSize = aSize * uPixelRatio * (300.0 / -mv.z);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform sampler2D uTex;
        uniform vec3 fogColor;
        uniform float fogNear;
        uniform float fogFar;
        varying vec3 vColor;
        varying float vFogDepth;
        void main() {
          vec4 tex = texture2D(uTex, gl_PointCoord);
          if (tex.a < 0.01) discard;
          float fogFactor = smoothstep(fogNear, fogFar, vFogDepth);
          vec3 col = vColor * tex.a;
          // additive: fade toward fog color (black) with distance
          col = mix(col, fogColor, fogFactor);
          gl_FragColor = vec4(col, tex.a * (1.0 - fogFactor));
        }
      `,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      vertexColors: true,
    });

    const points = new THREE.Points(nodeGeo, nodeMat);
    points.frustumCulled = false;
    scene.add(points);

    // --- Connections: near-neighbor lines, computed once ---
    // Spatial grid for efficiency.
    const CONNECT_DIST = 34;
    const CONNECT_DIST_SQ = CONNECT_DIST * CONNECT_DIST;
    const MAX_LINKS_PER_NODE = 3;

    const cell = CONNECT_DIST;
    const grid = new Map();
    const key = (ix, iy, iz) => ix + ',' + iy + ',' + iz;
    for (let i = 0; i < NODE_COUNT; i++) {
      const ix = Math.floor(positions[i*3+0] / cell);
      const iy = Math.floor(positions[i*3+1] / cell);
      const iz = Math.floor(positions[i*3+2] / cell);
      const k = key(ix, iy, iz);
      if (!grid.has(k)) grid.set(k, []);
      grid.get(k).push(i);
    }

    const linkPairs = [];
    const linkCount = new Int16Array(NODE_COUNT);
    for (let i = 0; i < NODE_COUNT; i++) {
      if (linkCount[i] >= MAX_LINKS_PER_NODE) continue;
      const ax = positions[i*3+0], ay = positions[i*3+1], az = positions[i*3+2];
      const ix = Math.floor(ax / cell), iy = Math.floor(ay / cell), iz = Math.floor(az / cell);
      for (let dx = -1; dx <= 1 && linkCount[i] < MAX_LINKS_PER_NODE; dx++)
      for (let dy = -1; dy <= 1 && linkCount[i] < MAX_LINKS_PER_NODE; dy++)
      for (let dz = -1; dz <= 1 && linkCount[i] < MAX_LINKS_PER_NODE; dz++) {
        const bucket = grid.get(key(ix+dx, iy+dy, iz+dz));
        if (!bucket) continue;
        for (let b = 0; b < bucket.length; b++) {
          const j = bucket[b];
          if (j <= i) continue;
          if (linkCount[j] >= MAX_LINKS_PER_NODE) continue;
          const ddx = ax - positions[j*3+0];
          const ddy = ay - positions[j*3+1];
          const ddz = az - positions[j*3+2];
          const d2 = ddx*ddx + ddy*ddy + ddz*ddz;
          if (d2 <= CONNECT_DIST_SQ) {
            linkPairs.push(i, j);
            linkCount[i]++; linkCount[j]++;
            if (linkCount[i] >= MAX_LINKS_PER_NODE) break;
          }
        }
      }
    }

    const linePos = new Float32Array(linkPairs.length * 3);
    const lineCol = new Float32Array(linkPairs.length * 3);
    for (let p = 0; p < linkPairs.length; p++) {
      const idx = linkPairs[p];
      linePos[p*3+0] = positions[idx*3+0];
      linePos[p*3+1] = positions[idx*3+1];
      linePos[p*3+2] = positions[idx*3+2];
      lineCol[p*3+0] = baseColor[idx*3+0];
      lineCol[p*3+1] = baseColor[idx*3+1];
      lineCol[p*3+2] = baseColor[idx*3+2];
    }
    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
    lineGeo.setAttribute('color', new THREE.BufferAttribute(lineCol, 3));
    const lineMat = new THREE.LineBasicMaterial({
      vertexColors: true,
      transparent: true,
      opacity: 0.14,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      fog: true,
    });
    const lines = new THREE.LineSegments(lineGeo, lineMat);
    lines.frustumCulled = false;
    scene.add(lines);

    // Map node index -> line vertex indices (for wrap sync)
    const nodeToLineVerts = new Array(NODE_COUNT);
    for (let i = 0; i < NODE_COUNT; i++) nodeToLineVerts[i] = [];
    for (let p = 0; p < linkPairs.length; p++) {
      nodeToLineVerts[linkPairs[p]].push(p);
    }

    // --- Pointer steering (parallax yaw/pitch) ---
    const target = { x: 0, y: 0 };
    const steer = { x: 0, y: 0 };
    window.addEventListener('pointermove', (e) => {
      target.x = (e.clientX / window.innerWidth) * 2 - 1;
      target.y = (e.clientY / window.innerHeight) * 2 - 1;
    });

    // --- Animation ---
    const posAttr = nodeGeo.getAttribute('position');
    const sizeAttr = nodeGeo.getAttribute('aSize');
    const colAttr = nodeGeo.getAttribute('color');
    const linePosAttr = lineGeo.getAttribute('position');

    const SPEED = prefersReduced ? 0.0 : 42.0; // units/sec forward (camera moves -Z)
    let camZ = 0;
    let lastT = performance.now();
    const tmpColor = new THREE.Color();

    function wrapNode(i, newZAbsolute) {
      // reposition node far ahead and randomize x/y and color
      const nx = (Math.random() * 2 - 1) * HALF_XY;
      const ny = (Math.random() * 2 - 1) * HALF_XY;
      positions[i*3+0] = nx;
      positions[i*3+1] = ny;
      positions[i*3+2] = newZAbsolute;
      // update linked line verts to follow the node (line partners keep their end)
      const verts = nodeToLineVerts[i];
      for (let v = 0; v < verts.length; v++) {
        const vp = verts[v];
        linePos[vp*3+0] = nx;
        linePos[vp*3+1] = ny;
        linePos[vp*3+2] = newZAbsolute;
      }
    }

    function frame(now) {
      const dt = Math.min((now - lastT) / 1000, 0.05);
      lastT = now;

      // steer lerp
      steer.x += (target.x - steer.x) * 0.05;
      steer.y += (target.y - steer.y) * 0.05;

      camZ -= SPEED * dt; // fly forward (-Z)
      camera.position.z = camZ;

      // parallax: nudge camera x/y and look slightly toward cursor
      camera.position.x += (steer.x * 18 - camera.position.x) * 0.04;
      camera.position.y += (-steer.y * 18 - camera.position.y) * 0.04;
      camera.rotation.y = -steer.x * 0.28;
      camera.rotation.x = steer.y * 0.22;

      // Wrap nodes that passed behind the camera, and brighten near ones.
      const wrapBehind = camZ + NEAR_Z;        // world Z threshold behind camera
      const wrapTo = camZ - DEPTH;             // reinsert this far ahead
      let lineDirty = false;

      for (let i = 0; i < NODE_COUNT; i++) {
        const z = positions[i*3+2];
        if (z > wrapBehind) {
          wrapNode(i, wrapTo + (z - wrapBehind)); // preserve overshoot
          lineDirty = true;
        }
        // distance from camera (mostly along Z)
        const dz = positions[i*3+2] - camZ;
        const dist = Math.abs(dz);
        // near => brighten & scale up
        const near = 1.0 - Math.min(dist / 180, 1.0); // 0..1
        const boost = near * near;
        sizes[i] = baseSize[i] * (1.0 + boost * 2.2);
        const bri = 1.0 + boost * 1.4;
        colors[i*3+0] = Math.min(baseColor[i*3+0] * bri, 1.6);
        colors[i*3+1] = Math.min(baseColor[i*3+1] * bri, 1.6);
        colors[i*3+2] = Math.min(baseColor[i*3+2] * bri, 1.6);
      }

      posAttr.needsUpdate = true;
      sizeAttr.needsUpdate = true;
      colAttr.needsUpdate = true;
      if (lineDirty) linePosAttr.needsUpdate = true;

      renderer.render(scene, camera);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      nodeMat.uniforms.uPixelRatio.value = renderer.getPixelRatio();
    });

  } catch (err) {
    console.error(err);
    showFallback();
  }
  </script>
</body>
</html>
