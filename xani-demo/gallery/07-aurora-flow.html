<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xanî — Aurora Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0d12; }
  body {
    background:
      radial-gradient(ellipse 120% 90% at 50% 40%, #12161f 0%, #0b0d12 55%, #07080c 100%);
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
  }
  #gl {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }
  #overlay {
    position: fixed;
    top: 22px;
    left: 26px;
    pointer-events: none;
    user-select: none;
    z-index: 10;
    line-height: 1.35;
  }
  #overlay .brand {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 20px;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.82);
  }
  #overlay .desc {
    margin-top: 3px;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.03em;
    color: rgba(255,255,255,0.42);
  }
  #fallback {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.6);
    z-index: 20;
  }
</style>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="overlay">
    <div class="brand">Xanî</div>
    <div class="desc">Aurora Flow — thoughts in motion.</div>
  </div>
  <div id="fallback">WebGL unavailable</div>

  <script type="module">
    import * as THREE from 'three';

    const fallback = document.getElementById('fallback');

    try {
      const canvas = document.getElementById('gl');
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // ---- Renderer ----
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x000000, 0);

      // ---- Scene & Camera ----
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 0, 9);

      // ---- Procedural glow sprite (radial gradient) ----
      function makeGlowTexture() {
        const size = 128;
        const c = document.createElement('canvas');
        c.width = c.height = size;
        const ctx = c.getContext('2d');
        const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
        g.addColorStop(0.0, 'rgba(255,255,255,1)');
        g.addColorStop(0.2, 'rgba(255,255,255,0.85)');
        g.addColorStop(0.45, 'rgba(255,255,255,0.32)');
        g.addColorStop(0.75, 'rgba(255,255,255,0.06)');
        g.addColorStop(1.0, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, size, size);
        const tex = new THREE.CanvasTexture(c);
        tex.needsUpdate = true;
        return tex;
      }
      const glowTex = makeGlowTexture();

      // ---- Particle setup ----
      const COUNT = 9000;
      const SPHERE_R = 4.0;
      const positions = new Float32Array(COUNT * 3);
      const colors = new Float32Array(COUNT * 3);

      // Aurora palette
      const palette = [
        new THREE.Color('#8df7e6'), // teal
        new THREE.Color('#5aa9ff'), // blue
        new THREE.Color('#b088ff'), // violet
        new THREE.Color('#ff7a52'), // terracotta
      ];

      function spawn(i, spread) {
        // spawn near center with small random offset
        const r = Math.random() * (spread || 0.6);
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
        positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i*3+2] = r * Math.cos(phi);
      }

      for (let i = 0; i < COUNT; i++) {
        // initial scatter through the whole volume for a full field at start
        spawn(i, SPHERE_R * 0.95);
        const base = palette[i % palette.length];
        colors[i*3]   = base.r;
        colors[i*3+1] = base.g;
        colors[i*3+2] = base.b;
      }

      const geometry = new THREE.BufferGeometry();
      const posAttr = new THREE.BufferAttribute(positions, 3);
      posAttr.setUsage(THREE.DynamicDrawUsage);
      geometry.setAttribute('position', posAttr);
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const material = new THREE.PointsMaterial({
        size: 0.11,
        map: glowTex,
        vertexColors: true,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        depthTest: false,
        sizeAttenuation: true,
        opacity: 0.9,
      });

      const points = new THREE.Points(geometry, material);
      scene.add(points);

      // ---- Pointer influence ----
      const pointer = new THREE.Vector2(0, 0);      // normalized -1..1
      const pointerTarget = new THREE.Vector2(0, 0);
      const influence = new THREE.Vector3(0, 0, 0);  // world-space influence point
      const tmp = new THREE.Vector3();

      window.addEventListener('pointermove', (e) => {
        pointerTarget.x = (e.clientX / window.innerWidth) * 2 - 1;
        pointerTarget.y = -((e.clientY / window.innerHeight) * 2 - 1);
      });
      window.addEventListener('pointerleave', () => {
        pointerTarget.set(0, 0);
      });

      // ---- Curl-ish flow field via layered sine/cos ----
      const F1 = 0.9, F2 = 1.3, F3 = 0.7;
      const SPEED = reduceMotion ? 0.06 : 0.9;   // motion scale
      const TIME_SCALE = reduceMotion ? 0.12 : 1.0;

      function flow(x, y, z, t, out) {
        const vx = Math.sin(y * F1 + t) + Math.cos(z * F2 - t * 0.8);
        const vy = Math.sin(z * F1 + t * 0.9) + Math.cos(x * F2 - t * 0.7);
        const vz = Math.sin(x * F3 - t * 0.6) + Math.cos(y * F2 + t * 0.85);
        out.set(vx, vy, vz);
        return out;
      }

      const vel = new THREE.Vector3();

      // ---- Resize ----
      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener('resize', onResize);

      // ---- Animation loop ----
      const clock = new THREE.Clock();
      const R2 = SPHERE_R * SPHERE_R;

      function animate() {
        requestAnimationFrame(animate);
        let dt = clock.getDelta();
        if (dt > 0.05) dt = 0.05; // clamp after tab switch
        const t = clock.elapsedTime * TIME_SCALE;

        // smooth pointer
        pointer.lerp(pointerTarget, 0.08);

        // map pointer into a world-space influence point on a plane in front of camera
        influence.set(pointer.x * 4.2, pointer.y * 3.0, 0);

        const arr = posAttr.array;
        const step = dt * SPEED;

        for (let i = 0; i < COUNT; i++) {
          const ix = i*3, iy = ix+1, iz = ix+2;
          let px = arr[ix], py = arr[iy], pz = arr[iz];

          // flow velocity
          flow(px, py, pz, t, vel);
          // graceful scaling
          vel.multiplyScalar(0.5);

          // cursor attraction + swirl on nearby particles
          const dx = influence.x - px;
          const dy = influence.y - py;
          const dz = influence.z - pz;
          const d2 = dx*dx + dy*dy + dz*dz;
          if (d2 < 4.0) {
            const falloff = (1.0 - d2 / 4.0);
            const pull = falloff * 1.6;
            vel.x += dx * pull;
            vel.y += dy * pull;
            // swirl (perpendicular in xy)
            vel.x += -dy * falloff * 1.3;
            vel.y += dx * falloff * 1.3;
            vel.z += dz * pull * 0.4;
          }

          px += vel.x * step;
          py += vel.y * step;
          pz += vel.z * step;

          // respawn when leaving bounding sphere
          const rr = px*px + py*py + pz*pz;
          if (rr > R2) {
            spawn(i, 0.6);
          } else {
            arr[ix] = px; arr[iy] = py; arr[iz] = pz;
          }
        }
        posAttr.needsUpdate = true;

        // slow rotation of the whole cloud
        points.rotation.y += dt * (reduceMotion ? 0.01 : 0.05);
        points.rotation.x = Math.sin(t * 0.1) * 0.12;

        // subtle camera parallax from cursor
        camera.position.x += (pointer.x * 1.1 - camera.position.x) * 0.04;
        camera.position.y += (pointer.y * 0.8 - camera.position.y) * 0.04;
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
      }
      animate();

    } catch (err) {
      console.error(err);
      fallback.style.display = 'flex';
    }
  </script>
</body>
</html>
