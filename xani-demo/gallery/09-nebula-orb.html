<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xanî — Nebula Orb</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0b0d12;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
body {
  background:
    radial-gradient(1200px 900px at 50% 42%, rgba(40, 60, 90, 0.35), rgba(11, 13, 18, 0) 60%),
    radial-gradient(900px 700px at 68% 70%, rgba(80, 40, 90, 0.22), rgba(11, 13, 18, 0) 65%),
    var(--bg);
  font-family: 'Inter', system-ui, sans-serif;
}
#gl {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  display: block;
}
#overlay {
  position: fixed;
  top: 26px;
  left: 30px;
  z-index: 10;
  pointer-events: none;
  user-select: none;
}
#overlay .title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 20px;
  letter-spacing: 0.02em;
  color: rgba(255, 255, 255, 0.82);
  line-height: 1.1;
}
#overlay .desc {
  margin-top: 5px;
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 0.04em;
  color: rgba(255, 255, 255, 0.42);
}
#fallback {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  color: rgba(255, 255, 255, 0.6);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px;
  letter-spacing: 0.05em;
  z-index: 20;
}
</style>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body>
<canvas id="gl"></canvas>
<div id="overlay">
  <div class="title">Xanî</div>
  <div class="desc">Nebula — MARVIN, breathing.</div>
</div>
<div id="fallback">WebGL unavailable</div>

<script type="module">
import * as THREE from 'three';

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function makeGlowSprite() {
  const size = 128;
  const cvs = document.createElement('canvas');
  cvs.width = cvs.height = size;
  const ctx = cvs.getContext('2d');
  const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  g.addColorStop(0.0, 'rgba(255,255,255,1)');
  g.addColorStop(0.2, 'rgba(255,255,255,0.85)');
  g.addColorStop(0.45, 'rgba(255,255,255,0.35)');
  g.addColorStop(0.75, 'rgba(255,255,255,0.08)');
  g.addColorStop(1.0, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(cvs);
  tex.needsUpdate = true;
  return tex;
}

// Fibonacci sphere distribution
function fibSphere(count, radius, jitter) {
  const pts = [];
  const golden = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < count; i++) {
    const y = 1 - (i / (count - 1)) * 2;
    const r = Math.sqrt(1 - y * y);
    const theta = golden * i;
    const x = Math.cos(theta) * r;
    const z = Math.sin(theta) * r;
    const j = jitter ? (Math.random() - 0.5) * jitter : 0;
    const rad = radius + j;
    pts.push(x * rad, y * rad, z * rad);
  }
  return pts;
}

const PALETTE = [
  new THREE.Color('#8df7e6'), // teal
  new THREE.Color('#5aa9ff'), // blue
  new THREE.Color('#b088ff'), // violet
  new THREE.Color('#ff7a52'), // terracotta
];

try {
  const canvas = document.getElementById('gl');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x0b0d12, 0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 6.4);

  const glowTex = makeGlowSprite();
  const orbGroup = new THREE.Group();
  scene.add(orbGroup);

  // ---- Shells ----
  const shellDefs = [
    { radius: 1.2, count: 2600, jitter: 0.10, size: 0.055, mix: [0, 1], rotSpeed: 0.055, axis: new THREE.Vector3(0.1, 1, 0.15) },
    { radius: 1.5, count: 2800, jitter: 0.12, size: 0.05, mix: [1, 2], rotSpeed: -0.04, axis: new THREE.Vector3(0.3, 1, -0.2) },
    { radius: 1.8, count: 2400, jitter: 0.14, size: 0.045, mix: [2, 3], rotSpeed: 0.03, axis: new THREE.Vector3(-0.2, 1, 0.35) },
  ];

  const shells = [];
  shellDefs.forEach((def) => {
    const raw = fibSphere(def.count, def.radius, def.jitter);
    const n = raw.length / 3;
    const positions = new Float32Array(raw);
    const basePositions = new Float32Array(raw);
    const colors = new Float32Array(n * 3);
    const seeds = new Float32Array(n);
    const cA = PALETTE[def.mix[0]];
    const cB = PALETTE[def.mix[1]];
    for (let i = 0; i < n; i++) {
      const t = Math.random();
      const c = cA.clone().lerp(cB, t);
      // per-point brightness variation
      const b = 0.6 + Math.random() * 0.4;
      colors[i * 3] = c.r * b;
      colors[i * 3 + 1] = c.g * b;
      colors[i * 3 + 2] = c.b * b;
      seeds[i] = Math.random() * Math.PI * 2;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const mat = new THREE.PointsMaterial({
      size: def.size,
      map: glowTex,
      vertexColors: true,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      sizeAttenuation: true,
      opacity: 0.9,
    });
    const points = new THREE.Points(geo, mat);
    orbGroup.add(points);
    shells.push({ points, def, basePositions, seeds, positions });
  });

  // ---- Bright dense core ----
  const coreCount = 900;
  const corePos = new Float32Array(coreCount * 3);
  const coreCol = new Float32Array(coreCount * 3);
  for (let i = 0; i < coreCount; i++) {
    // gaussian-ish cluster near center
    const r = Math.pow(Math.random(), 1.8) * 0.75;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    corePos[i * 3] = r * Math.sin(ph) * Math.cos(th);
    corePos[i * 3 + 1] = r * Math.sin(ph) * Math.sin(th);
    corePos[i * 3 + 2] = r * Math.cos(ph);
    const c = PALETTE[0].clone().lerp(PALETTE[1], Math.random() * 0.5);
    const b = 0.9 + Math.random() * 0.4;
    coreCol[i * 3] = c.r * b;
    coreCol[i * 3 + 1] = c.g * b;
    coreCol[i * 3 + 2] = c.b * b;
  }
  const coreGeo = new THREE.BufferGeometry();
  coreGeo.setAttribute('position', new THREE.BufferAttribute(corePos, 3));
  coreGeo.setAttribute('color', new THREE.BufferAttribute(coreCol, 3));
  const coreMat = new THREE.PointsMaterial({
    size: 0.07, map: glowTex, vertexColors: true, transparent: true,
    depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true, opacity: 0.95,
  });
  const corePoints = new THREE.Points(coreGeo, coreMat);
  orbGroup.add(corePoints);

  // ---- Drifting sparks ----
  const sparkCount = 200;
  const sparkGeo = new THREE.BufferGeometry();
  const sparkPos = new Float32Array(sparkCount * 3);
  const sparkCol = new Float32Array(sparkCount * 3);
  const sparkData = [];
  for (let i = 0; i < sparkCount; i++) {
    const radius = 2.3 + Math.random() * 1.6;
    const inc = Math.acos(2 * Math.random() - 1);
    const phase = Math.random() * Math.PI * 2;
    const speed = (0.08 + Math.random() * 0.18) * (Math.random() < 0.5 ? 1 : -1);
    sparkData.push({ radius, inc, phase, speed });
    const c = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    sparkCol[i * 3] = c.r;
    sparkCol[i * 3 + 1] = c.g;
    sparkCol[i * 3 + 2] = c.b;
  }
  sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));
  sparkGeo.setAttribute('color', new THREE.BufferAttribute(sparkCol, 3));
  const sparkMat = new THREE.PointsMaterial({
    size: 0.09, map: glowTex, vertexColors: true, transparent: true,
    depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true, opacity: 0.85,
  });
  const sparks = new THREE.Points(sparkGeo, sparkMat);
  scene.add(sparks);

  function updateSparks(t) {
    for (let i = 0; i < sparkCount; i++) {
      const d = sparkData[i];
      const a = d.phase + t * d.speed;
      const r = d.radius;
      const si = Math.sin(d.inc);
      sparkPos[i * 3] = Math.cos(a) * r * si;
      sparkPos[i * 3 + 1] = Math.cos(d.inc) * r * 0.6 + Math.sin(a * 0.7) * 0.25;
      sparkPos[i * 3 + 2] = Math.sin(a) * r * si;
    }
    sparkGeo.attributes.position.needsUpdate = true;
  }
  updateSparks(0);

  // ---- Outer halo sprite ----
  const haloMat = new THREE.SpriteMaterial({
    map: glowTex,
    color: new THREE.Color('#6ea8ff'),
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    opacity: 0.5,
  });
  const halo = new THREE.Sprite(haloMat);
  halo.scale.set(9, 9, 1);
  halo.position.set(0, 0, -1.2);
  scene.add(halo);

  const haloMat2 = new THREE.SpriteMaterial({
    map: glowTex, color: new THREE.Color('#b088ff'), transparent: true,
    blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.35,
  });
  const halo2 = new THREE.Sprite(haloMat2);
  halo2.scale.set(5.5, 5.5, 1);
  halo2.position.set(0, 0, -0.5);
  scene.add(halo2);

  // ---- Background starfield ----
  const starCount = 700;
  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(starCount * 3);
  const starCol = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 20 + Math.random() * 30;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    starPos[i * 3] = r * Math.sin(ph) * Math.cos(th);
    starPos[i * 3 + 1] = r * Math.sin(ph) * Math.sin(th);
    starPos[i * 3 + 2] = r * Math.cos(ph);
    const b = 0.4 + Math.random() * 0.6;
    starCol[i * 3] = b * 0.8;
    starCol[i * 3 + 1] = b * 0.85;
    starCol[i * 3 + 2] = b;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
  const starMat = new THREE.PointsMaterial({
    size: 0.14, map: glowTex, vertexColors: true, transparent: true,
    depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true, opacity: 0.7,
  });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  // ---- Pointer parallax ----
  const pointer = { x: 0, y: 0 };
  const targetRot = { x: 0, y: 0 };
  window.addEventListener('pointermove', (e) => {
    pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
    pointer.y = (e.clientY / window.innerHeight) * 2 - 1;
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  const clock = new THREE.Clock();
  let elapsed = 0;

  const tmpAxis = new THREE.Vector3();

  function animate() {
    requestAnimationFrame(animate);
    const dt = reduceMotion ? 0 : clock.getDelta();
    elapsed += dt;
    const t = elapsed;

    // Breathing scale
    const breathe = reduceMotion ? 1 : 1 + Math.sin(t * 0.6) * 0.04;
    orbGroup.scale.setScalar(breathe);

    // Slow base rotation
    if (!reduceMotion) orbGroup.rotation.y += 0.0016;

    // Per-shell independent swirl
    shells.forEach((s) => {
      tmpAxis.copy(s.def.axis).normalize();
      s.points.rotateOnAxis(tmpAxis, s.def.rotSpeed * dt);

      // subtle radial shimmer
      if (!reduceMotion) {
        const pos = s.positions;
        const base = s.basePositions;
        const seeds = s.seeds;
        const n = seeds.length;
        for (let i = 0; i < n; i++) {
          const k = 1 + Math.sin(t * 1.4 + seeds[i]) * 0.018;
          pos[i * 3] = base[i * 3] * k;
          pos[i * 3 + 1] = base[i * 3 + 1] * k;
          pos[i * 3 + 2] = base[i * 3 + 2] * k;
        }
        s.points.geometry.attributes.position.needsUpdate = true;
      }
    });

    corePoints.rotation.y -= 0.001;

    if (!reduceMotion) updateSparks(t);

    // Pointer parallax lerp
    targetRot.y = pointer.x * 0.45;
    targetRot.x = pointer.y * 0.3;
    orbGroup.rotation.x += (targetRot.x - orbGroup.rotation.x) * 0.04;
    const desiredY = orbGroup.rotation.y + (targetRot.y - (orbGroup.rotation.y % (Math.PI * 2))) * 0;
    // parallax on the whole scene tilt via camera offset instead for smoothness
    camera.position.x += (pointer.x * 0.6 - camera.position.x) * 0.04;
    camera.position.y += (-pointer.y * 0.4 - camera.position.y) * 0.04;
    camera.lookAt(0, 0, 0);

    // halo pulse
    const hp = reduceMotion ? 1 : 1 + Math.sin(t * 0.6) * 0.05;
    halo.scale.set(9 * hp, 9 * hp, 1);
    halo2.scale.set(5.5 * hp, 5.5 * hp, 1);

    if (!reduceMotion) stars.rotation.y += 0.0002;

    renderer.render(scene, camera);
  }
  animate();

} catch (err) {
  console.error(err);
  document.getElementById('gl').style.display = 'none';
  document.getElementById('fallback').style.display = 'flex';
}
</script>
</body>
</html>
